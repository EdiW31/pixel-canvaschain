<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Pixel CanvasChain - A massively multiplayer collaborative canvas on MultiversX blockchain with 50% philanthropic giving" />
    <meta name="theme-color" content="#FBFAF6" />
    <title>Pixel CanvasChain | Decentralized Philanthropic Art</title>
    <!-- Apply theme BEFORE React renders to avoid a light-mode flash on dark visitors. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('canvaschain-theme');
          var theme = (saved === 'light' || saved === 'dark')
            ? saved
            : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          var root = document.documentElement;
          root.setAttribute('data-theme', theme);
          if (theme === 'dark') root.classList.add('dark');
          else root.classList.remove('dark');
        } catch (_) { /* private mode etc. */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- sdk-dapp web components mount themselves on document.body — no anchor div needed.
         Adding one caused WalletConnect's QR panel to mount inside the unlock panel
         and disappear when the unlock panel transitioned views. -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
